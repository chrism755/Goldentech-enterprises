<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>His Story</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
  }
  .video-wrap {
    position:relative;
    width:100%; height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  video {
    width:100%; height:100%;
    object-fit:cover;
  }
  .caption {
    position:absolute;
    bottom:6%;
    left:50%;
    transform:translateX(-50%);
    color:#f3e9d2;
    font-family:Georgia, serif;
    font-size:1.4rem;
    letter-spacing:2px;
    text-shadow:0 2px 10px rgba(0,0,0,0.8);
    pointer-events:none;
  }
  .sound-btn {
    position:absolute;
    top:5%; right:5%;
    background:rgba(0,0,0,0.5);
    color:#fff;
    border:1px solid rgba(255,255,255,0.4);
    border-radius:20px;
    padding:8px 16px;
    font-family:Georgia, serif;
    font-size:0.9rem;
    cursor:pointer;
    backdrop-filter: blur(4px);
  }
</style>
</head>
<body>

<div class="video-wrap">
  <!-- Replace bedtime-story.mp4 with your own video file (same folder, same filename) -->
  <video id="mainVideo" autoplay muted loop playsinline>
    <source src="bedtime-story.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="caption">His Story</div>
  <button class="sound-btn" id="soundBtn">🔇 Tap for sound</button>
</div>

<script>
  const video = document.getElementById('mainVideo');
  const btn = document.getElementById('soundBtn');
  btn.addEventListener('click', () => {
    video.muted = !video.muted;
    btn.textContent = video.muted ? '🔇 Tap for sound' : '🔊 Sound on';
  });
</script>

</body>
</html>
